<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jobbr Logo</title>
  <style>
    :root {
      --bg: #0a1015;
      --panel: #121a22;
      --panel-border: rgba(142, 159, 170, 0.18);
      --grid: rgba(142, 159, 170, 0.12);
      --text: #e6ece4;
      --muted: #9aa7a5;
      --pixel-a: #d0d595;
      --pixel-b: #c7ac70;
      --pixel-c: #be7760;
      --pixel-d: #98ae71;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 20% 18%, rgba(107, 139, 151, 0.14), transparent 24%),
        radial-gradient(circle at 82% 22%, rgba(199, 172, 112, 0.12), transparent 26%),
        linear-gradient(180deg, #071018 0%, var(--bg) 100%);
      font-family: "Fira Sans", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 22px 22px;
      pointer-events: none;
      opacity: 0.34;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .stage {
      display: grid;
      justify-items: center;
      gap: 16px;
      padding: 28px;
      border-radius: 28px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      box-shadow: 0 22px 48px rgba(0, 0, 0, 0.24);
    }

    .board {
      width: min(44vw, 280px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      padding: 18px;
      border-radius: 24px;
      border: 1px solid var(--panel-border);
      background:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px),
        #0d151d;
      background-size: calc(100% / 8) calc(100% / 8);
    }

    svg {
      width: 100%;
      height: 100%;
    }

    .caption {
      margin: 0;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .subtle {
      margin: 0;
      color: var(--text);
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1;
    }

    .pixel-a { fill: var(--pixel-a); }
    .pixel-b { fill: var(--pixel-b); }
    .pixel-c { fill: var(--pixel-c); }
    .pixel-d { fill: var(--pixel-d); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="stage">
      <div class="board" aria-label="Pixel block J logo">
        <svg viewBox="0 0 80 80" role="img" aria-hidden="true">
          <rect class="pixel-a" x="61" y="1" width="8" height="8" rx="1.4"/>
          <rect class="pixel-b" x="71" y="1" width="8" height="8" rx="1.4"/>
          <rect class="pixel-b" x="61" y="11" width="8" height="8" rx="1.4"/>
          <rect class="pixel-c" x="71" y="11" width="8" height="8" rx="1.4"/>
          <rect class="pixel-a" x="61" y="21" width="8" height="8" rx="1.4"/>
          <rect class="pixel-b" x="71" y="21" width="8" height="8" rx="1.4"/>
          <rect class="pixel-b" x="61" y="31" width="8" height="8" rx="1.4"/>
          <rect class="pixel-d" x="71" y="31" width="8" height="8" rx="1.4"/>
          <rect class="pixel-a" x="61" y="41" width="8" height="8" rx="1.4"/>
          <rect class="pixel-c" x="71" y="41" width="8" height="8" rx="1.4"/>
          <rect class="pixel-b" x="1" y="51" width="8" height="8" rx="1.4"/>
          <rect class="pixel-a" x="11" y="51" width="8" height="8" rx="1.4"/>
          <rect class="pixel-d" x="21" y="51" width="8" height="8" rx="1.4"/>
          <rect class="pixel-c" x="61" y="51" width="8" height="8" rx="1.4"/>
          <rect class="pixel-b" x="71" y="51" width="8" height="8" rx="1.4"/>
          <rect class="pixel-a" x="11" y="61" width="8" height="8" rx="1.4"/>
          <rect class="pixel-b" x="21" y="61" width="8" height="8" rx="1.4"/>
          <rect class="pixel-c" x="31" y="61" width="8" height="8" rx="1.4"/>
          <rect class="pixel-d" x="41" y="61" width="8" height="8" rx="1.4"/>
          <rect class="pixel-b" x="51" y="61" width="8" height="8" rx="1.4"/>
          <rect class="pixel-a" x="61" y="61" width="8" height="8" rx="1.4"/>
          <rect class="pixel-b" x="71" y="61" width="8" height="8" rx="1.4"/>
          <rect class="pixel-c" x="31" y="71" width="8" height="8" rx="1.4"/>
          <rect class="pixel-a" x="41" y="71" width="8" height="8" rx="1.4"/>
          <rect class="pixel-b" x="51" y="71" width="8" height="8" rx="1.4"/>
        </svg>
      </div>
      <p class="caption">jobbr</p>
      <p class="subtle">Static brand mark for login and app chrome</p>
    </div>
  </div>
</body>
</html>
