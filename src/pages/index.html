<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Fira+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <title>jobbr</title>
</head>
<body>
    <main class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="brand">
                    <div class="brand-logo" aria-hidden="true">
                        <div class="brand-logo__frame">
                            <div class="brand-logo__board">
                                <svg class="brand-logo__glyph" viewBox="0 0 80 80" focusable="false" aria-hidden="true">
                                    <rect class="pixel pixel-a" x="61" y="1" width="8" height="8"/>
                                    <rect class="pixel pixel-b" x="71" y="1" width="8" height="8"/>
                                    <rect class="pixel pixel-b" x="61" y="11" width="8" height="8"/>
                                    <rect class="pixel pixel-c" x="71" y="11" width="8" height="8"/>
                                    <rect class="pixel pixel-a" x="61" y="21" width="8" height="8"/>
                                    <rect class="pixel pixel-b" x="71" y="21" width="8" height="8"/>
                                    <rect class="pixel pixel-b" x="61" y="31" width="8" height="8"/>
                                    <rect class="pixel pixel-d" x="71" y="31" width="8" height="8"/>
                                    <rect class="pixel pixel-a" x="61" y="41" width="8" height="8"/>
                                    <rect class="pixel pixel-c" x="71" y="41" width="8" height="8"/>
                                    <rect class="pixel pixel-b" x="1" y="51" width="8" height="8"/>
                                    <rect class="pixel pixel-a" x="11" y="51" width="8" height="8"/>
                                    <rect class="pixel pixel-d" x="21" y="51" width="8" height="8"/>
                                    <rect class="pixel pixel-c" x="61" y="51" width="8" height="8"/>
                                    <rect class="pixel pixel-b" x="71" y="51" width="8" height="8"/>
                                    <rect class="pixel pixel-a" x="11" y="61" width="8" height="8"/>
                                    <rect class="pixel pixel-b" x="21" y="61" width="8" height="8"/>
                                    <rect class="pixel pixel-c" x="31" y="61" width="8" height="8"/>
                                    <rect class="pixel pixel-d" x="41" y="61" width="8" height="8"/>
                                    <rect class="pixel pixel-b" x="51" y="61" width="8" height="8"/>
                                    <rect class="pixel pixel-a" x="61" y="61" width="8" height="8"/>
                                    <rect class="pixel pixel-b" x="71" y="61" width="8" height="8"/>
                                    <rect class="pixel pixel-c" x="31" y="71" width="8" height="8"/>
                                    <rect class="pixel pixel-a" x="41" y="71" width="8" height="8"/>
                                    <rect class="pixel pixel-b" x="51" y="71" width="8" height="8"/>
                                </svg>
                            </div>
                        </div>
                    </div>
                    <div class="brand-copy">
                        <p class="brand-kicker">Private Workspace</p>
                        <h1>jobbr</h1>
                    </div>
                </div>
            </div>

            <section class="sidebar-section">
                <div class="section-label">Chats</div>
                <div id="chat-list" class="chat-list"></div>
            </section>

            <footer class="sidebar-footer">
                <div class="user-card">
                    <div class="user-avatar" id="user-avatar">A</div>
                    <div class="user-meta">
                        <strong id="user-name">admin</strong>
                        <span id="user-email">admin@example.com</span>
                    </div>
                </div>
                <button id="logout-button" class="ghost-button" type="button">Log out</button>
            </footer>
        </aside>

        <button id="sidebar-backdrop" class="sidebar-backdrop" type="button" aria-label="Close chat list"></button>

        <section class="conversation-panel">
            <header class="conversation-header">
                <div class="conversation-heading">
                    <button id="sidebar-toggle-button" class="ghost-button sidebar-toggle" type="button">Chats</button>
                    <h4 id="chat-title">New chat</h4>
                </div>
                <div class="conversation-actions">
                    <button id="new-chat-button" class="ghost-button icon-button icon-button-primary" type="button" aria-label="New chat" title="New chat">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
                        </svg>
                    </button>
                    <button id="rename-chat-button" class="ghost-button icon-button" type="button" aria-label="Rename chat" title="Rename chat">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M4 20l4.5-1 9.3-9.3a1.8 1.8 0 0 0 0-2.5l-1-1a1.8 1.8 0 0 0-2.5 0L5 15.5 4 20z" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/>
                            <path d="M13.5 6.5l4 4" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2"/>
                        </svg>
                    </button>
                    <button id="delete-chat-button" class="ghost-button icon-button danger-button" type="button" aria-label="Delete chat" title="Delete chat">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M4 7h16M9 7V4h6v3M8 7l.7 12h6.6L16 7" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
                            <path d="M10 11v5M14 11v5" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2"/>
                        </svg>
                    </button>
                </div>
            </header>

            <div id="empty-state" class="empty-state">
                <div class="empty-state-brand">
                    <div class="brand-logo brand-logo--hero" aria-hidden="true">
                        <div class="brand-logo__frame">
                            <div class="brand-logo__board">
                                <svg class="brand-logo__glyph" viewBox="0 0 80 80" focusable="false" aria-hidden="true">
                                    <rect class="pixel pixel-a" x="61" y="1" width="9" height="9"/>
                                    <rect class="pixel pixel-b" x="71" y="1" width="9" height="9"/>
                                    <rect class="pixel pixel-b" x="61" y="11" width="9" height="9"/>
                                    <rect class="pixel pixel-c" x="71" y="11" width="9" height="9"/>
                                    <rect class="pixel pixel-a" x="61" y="21" width="9" height="9"/>
                                    <rect class="pixel pixel-b" x="71" y="21" width="9" height="9"/>
                                    <rect class="pixel pixel-b" x="61" y="31" width="9" height="9"/>
                                    <rect class="pixel pixel-d" x="71" y="31" width="9" height="9"/>
                                    <rect class="pixel pixel-a" x="61" y="41" width="9" height="9"/>
                                    <rect class="pixel pixel-c" x="71" y="41" width="9" height="9"/>
                                    <rect class="pixel pixel-b" x="1" y="51" width="9" height="9"/>
                                    <rect class="pixel pixel-a" x="11" y="51" width="9" height="9"/>
                                    <rect class="pixel pixel-d" x="21" y="51" width="9" height="9"/>
                                    <rect class="pixel pixel-c" x="61" y="51" width="9" height="9"/>
                                    <rect class="pixel pixel-b" x="71" y="51" width="9" height="9"/>
                                    <rect class="pixel pixel-a" x="11" y="61" width="9" height="9"/>
                                    <rect class="pixel pixel-b" x="21" y="61" width="9" height="9"/>
                                    <rect class="pixel pixel-c" x="31" y="61" width="9" height="9"/>
                                    <rect class="pixel pixel-d" x="41" y="61" width="9" height="9"/>
                                    <rect class="pixel pixel-b" x="51" y="61" width="9" height="9"/>
                                    <rect class="pixel pixel-a" x="61" y="61" width="9" height="9"/>
                                    <rect class="pixel pixel-b" x="71" y="61" width="9" height="9"/>
                                    <rect class="pixel pixel-c" x="31" y="71" width="9" height="9"/>
                                    <rect class="pixel pixel-a" x="41" y="71" width="9" height="9"/>
                                    <rect class="pixel pixel-b" x="51" y="71" width="9" height="9"/>
                                </svg>
                            </div>
                        </div>
                    </div>
                    <p class="empty-state-kicker">Private workspace</p>
                    <h3>jobbr</h3>
                    <p>Start a new chat on the left or send a message to begin.</p>
                </div>
            </div>

            <section id="chat-thread" class="chat-thread"></section>

            <form id="composer" class="composer">
                <textarea
                    id="input-box"
                    rows="1"
                    placeholder="Message jobbr"
                    spellcheck="true"
                ></textarea>
                <button id="send-button" type="submit">Send</button>
            </form>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.1/dist/markdown-it.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
