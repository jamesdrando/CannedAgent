<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d1114">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Fira+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/admin.css">
    <title>Admin | jobbr</title>
</head>
<body>
    <main class="admin-shell">
        <header class="admin-header">
            <div>
                <p class="admin-kicker">Admin</p>
                <h1>User Management</h1>
                <p id="admin-subtitle" class="admin-subtitle">Loading admin workspace...</p>
            </div>
            <a class="ghost-button" href="/app">Back to app</a>
        </header>

        <section class="summary-grid">
            <article class="summary-card">
                <span>Total users</span>
                <strong id="summary-users">0</strong>
            </article>
            <article class="summary-card">
                <span>Total requests</span>
                <strong id="summary-requests">0</strong>
            </article>
            <article class="summary-card">
                <span>Total tokens</span>
                <strong id="summary-tokens">0</strong>
            </article>
            <article class="summary-card">
                <span>Top provider</span>
                <strong id="summary-provider">None</strong>
            </article>
        </section>

        <section class="admin-grid">
            <section class="panel">
                <div class="panel-header">
                    <div>
                        <p class="panel-kicker">Access</p>
                        <h2>Create user</h2>
                    </div>
                </div>
                <form id="create-user-form" class="stack-form">
                    <label>
                        <span>Username</span>
                        <input id="create-username" type="text" autocomplete="off" required>
                    </label>
                    <label>
                        <span>Email</span>
                        <input id="create-email" type="email" autocomplete="off" required>
                    </label>
                    <label>
                        <span>Password</span>
                        <input id="create-password" type="text" autocomplete="off" required>
                    </label>
                    <button id="create-user-button" class="primary-button" type="submit">Create user</button>
                    <p id="create-user-feedback" class="feedback" data-tone="muted"></p>
                </form>
            </section>

            <section class="panel usage-panel">
                <div class="panel-header">
                    <div>
                        <p class="panel-kicker">Usage</p>
                        <h2>Recent token events</h2>
                    </div>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>User</th>
                                <th>Provider</th>
                                <th>Model</th>
                                <th>Tokens</th>
                                <th>When</th>
                            </tr>
                        </thead>
                        <tbody id="usage-table-body"></tbody>
                    </table>
                </div>
            </section>
        </section>

        <section class="panel">
            <div class="panel-header">
                <div>
                    <p class="panel-kicker">Users</p>
                    <h2>Manage accounts</h2>
                </div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Status</th>
                            <th>Chats</th>
                            <th>Messages</th>
                            <th>Tokens</th>
                            <th>Last login</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="/static/js/admin.js"></script>
</body>
</html>
